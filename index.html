<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Service Desk Classifier</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background"></div>

    <div class="container">
        <h1>Service Desk Ticket Classifier</h1>
        <p class="subtitle">Automatically route tickets to the correct department</p>

        <textarea id="ticketInput"
            placeholder="Enter ticket description here..."></textarea>

        <button onclick="predictDepartment()" id="predictBtn">
            Raise Issue
        </button>

        <div id="result" class="result"></div>
    </div>

<script src="index.js"></script>
</body>
</html>
